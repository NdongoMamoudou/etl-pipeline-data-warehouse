
# dbt_project.yml = plan du projet
#                   "comment je travaille"


name: 'etl_project'
version: '1.0.0'
config-version: 2

profile: 'etl_project'

model-paths: ["models"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]

target-path: "target"
clean-targets: ["target", "dbt_packages"]

models:
  etl_project:

    staging:
      +schema: staging
      +materialized: view

    intermediate:
      +schema: intermediate
      +materialized: view

    marts:
      +schema: dwh
      +materialized: table