version: "3.8"

services:

  # ==========================================
  # POSTGRESQL
  # Base de données principale :
  # - staging
  # - intermediate
  # - dwh
  # - airflow metadata
  # ==========================================
  postgres:
    image: postgres:15
    container_name: etl_postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      # Stockage persistant des données PostgreSQL
      - postgres_data:/var/lib/postgresql/data

      # Scripts SQL exécutés au démarrage initial
      - ./init:/docker-entrypoint-initdb.d
    networks:
      - etl-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================
  # AIRFLOW WEBSERVER
  # Interface web Airflow
  # Accessible sur http://localhost:8080
  # ==========================================
  airflow-webserver:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    container_name: etl_airflow_webserver
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Type d'exécuteur Airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor

      # Connexion de Airflow à la base metadata
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/airflow_db

      # Clés de sécurité Airflow
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY}

      # Désactiver les DAGs d'exemple
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"

      # Création automatique de la base Airflow et de l'utilisateur admin
      _AIRFLOW_DB_MIGRATE: "true"
      _AIRFLOW_WWW_USER_CREATE: "true"
      _AIRFLOW_WWW_USER_USERNAME: ${AIRFLOW_ADMIN_USER}
      _AIRFLOW_WWW_USER_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD}

    ports:
      - "8080:8080"

    volumes:
      # DAGs Airflow
      - ./dags:/opt/airflow/dags

      # Logs Airflow
      - ./logs:/opt/airflow/logs

      # Plugins Airflow
      - ./plugins:/opt/airflow/plugins

      # Données du projet (scripts Python, CSV, etc.)
      - ./data:/opt/airflow/data

      # Permet à Airflow de faire docker exec
      - /var/run/docker.sock:/var/run/docker.sock

    command: webserver
    networks:
      - etl-network

  # ==========================================
  # AIRFLOW SCHEDULER
  # Moteur qui exécute automatiquement les DAGs
  # ==========================================
  airflow-scheduler:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    container_name: etl_airflow_scheduler
    restart: unless-stopped
    depends_on:
      - airflow-webserver
    environment:
      # Type d'exécuteur Airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor

      # Connexion à la base metadata Airflow
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/airflow_db

      # Clés de sécurité
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY}

      # Désactiver les DAGs d'exemple
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"

    volumes:
      # DAGs Airflow
      - ./dags:/opt/airflow/dags

      # Logs Airflow
      - ./logs:/opt/airflow/logs

      # Plugins Airflow
      - ./plugins:/opt/airflow/plugins

      # Données du projet
      - ./data:/opt/airflow/data

      # Permet au scheduler d'exécuter docker exec etl_dbt ...
      - /var/run/docker.sock:/var/run/docker.sock

    command: scheduler
    networks:
      - etl-network

  # ==========================================
  # DBT
  # Conteneur dédié aux transformations dbt
  # ==========================================
  dbt:
    image: ghcr.io/dbt-labs/dbt-postgres:1.7.0
    container_name: etl_dbt
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Emplacement du fichier profiles.yml
      DBT_PROFILES_DIR: /dbt
    volumes:
      # Projet dbt monté dans le conteneur
      - ./dbt:/dbt
    networks:
      - etl-network

    # Garde le conteneur vivant pour permettre docker exec
    entrypoint: ["tail", "-f", "/dev/null"]

  # ==========================================
  # METABASE
  # Outil de dashboard / visualisation
  # Accessible sur http://localhost:3000
  # ==========================================
  metabase:
    image: metabase/metabase:latest
    container_name: etl_metabase
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      # Base interne de Metabase pour stocker sa config
      MB_DB_FILE: /metabase.db
    volumes:
      # Stockage persistant des dashboards et réglages Metabase
      - metabase_data:/metabase-data
    networks:
      - etl-network

# ==========================================
# VOLUMES
# ==========================================
volumes:
  # Données persistantes PostgreSQL
  postgres_data:

  # Données persistantes Metabase
  metabase_data:

# ==========================================
# RÉSEAU
# Permet à tous les conteneurs de communiquer
# ==========================================
networks:
  etl-network:
    driver: bridge